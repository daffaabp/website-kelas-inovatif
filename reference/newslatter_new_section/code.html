<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Stacked Form Newsletter Banner</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1A4134", // Forest green
                        "primary-hover": "#143329",
                        "background-light": "#FAFAFA",
                        "background-dark": "#18181B",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#27272A",
                        "text-light": "#1F2937",
                        "text-dark": "#E5E7EB",
                        "text-muted-light": "#6B7280",
                        "text-muted-dark": "#9CA3AF",
                        "border-light": "#E5E7EB",
                        "border-dark": "#3F3F46",
                    },
                    fontFamily: {
                        display: ["Playfair Display", "serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': "1rem",
                        '2xl': "1.5rem",
                        '3xl': "2rem",
                    },
                    backgroundImage: {
                        'pattern-light': "url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E\")",
                        'pattern-dark': "url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E\")",
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-950 flex items-center justify-center min-h-screen p-4 font-sans antialiased">
    <div
        class="relative w-full max-w-6xl mx-auto overflow-hidden rounded-3xl border border-border-light dark:border-border-dark shadow-xl bg-background-light dark:bg-surface-dark transition-colors duration-300">
        <div class="absolute inset-0 z-0 bg-pattern-light dark:bg-pattern-dark opacity-100 pointer-events-none"></div>
        <div class="relative z-10 flex flex-col lg:flex-row items-center justify-between p-8 lg:p-12 gap-10">
            <div
                class="flex flex-col md:flex-row items-center md:items-start lg:items-center gap-6 lg:w-5/12 w-full text-center md:text-left">
                <div class="flex items-center gap-4 flex-shrink-0">
                    <div
                        class="h-16 w-16 rounded-2xl bg-primary flex items-center justify-center shadow-xl shadow-primary/20">
                        <span class="font-display italic text-white text-3xl font-bold">K</span>
                    </div>
                    <div class="flex flex-col items-start">
                        <h2 class="text-xl font-bold text-text-light dark:text-text-dark tracking-tight leading-none">
                            KelasInovatif</h2>
                        <span
                            class="text-xs font-bold tracking-widest text-text-muted-light dark:text-text-muted-dark uppercase mt-1">Komunitas
                            AI</span>
                    </div>
                </div>
                <div class="hidden lg:block h-16 w-px bg-border-light dark:bg-border-dark mx-2"></div>
                <h1 class="text-3xl lg:text-5xl font-display text-primary dark:text-white leading-tight font-bold">
                    Newsletter Komunitas
                </h1>
            </div>
            <div class="w-full lg:w-6/12">
                <form class="flex flex-col gap-4 w-full" onsubmit="event.preventDefault();">
                    <div class="flex flex-col sm:flex-row gap-4">
                        <div class="flex-1">
                            <label class="sr-only" for="first-name">Nama Depan</label>
                            <input
                                class="w-full px-5 py-4 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-background-dark text-text-light dark:text-text-dark focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-text-muted-light dark:placeholder-text-muted-dark shadow-sm"
                                id="first-name" placeholder="Nama Depan" type="text" />
                        </div>
                        <div class="flex-1">
                            <label class="sr-only" for="last-name">Nama Belakang</label>
                            <input
                                class="w-full px-5 py-4 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-background-dark text-text-light dark:text-text-dark focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-text-muted-light dark:placeholder-text-muted-dark shadow-sm"
                                id="last-name" placeholder="Nama Belakang" type="text" />
                        </div>
                    </div>
                    <div class="w-full">
                        <label class="sr-only" for="email">Masukkan email Anda...</label>
                        <input
                            class="w-full px-5 py-4 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-background-dark text-text-light dark:text-text-dark focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-text-muted-light dark:placeholder-text-muted-dark shadow-sm"
                            id="email" placeholder="Masukkan email Anda..." type="email" />
                    </div>
                    <button
                        class="w-full bg-primary hover:bg-primary-hover text-white font-bold text-sm tracking-widest uppercase py-4 rounded-xl transition-all duration-200 flex items-center justify-center shadow-lg shadow-primary/10 active:scale-[0.98]"
                        type="submit">
                        BERLANGGANAN
                    </button>
                    <p
                        class="text-[10px] text-center text-text-muted-light dark:text-text-muted-dark uppercase tracking-widest mt-1">
                        Dapatkan update mingguan langsung ke inbox Anda
                    </p>
                </form>
            </div>
        </div>
    </div>
    <div class="fixed bottom-6 right-6 z-50">
        <button
            class="bg-white dark:bg-surface-dark text-text-light dark:text-text-dark p-3.5 rounded-full shadow-2xl hover:scale-110 transition-transform border border-border-light dark:border-border-dark flex items-center justify-center"
            onclick="document.documentElement.classList.toggle('dark')">
            <span class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:inline">light_mode</span>
        </button>
    </div>

</body>

</html>
